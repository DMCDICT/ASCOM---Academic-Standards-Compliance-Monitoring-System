<!DOCTYPE html>
<html>
<head>
    <title>Password Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .result { margin: 10px 0; padding: 10px; background: #f0f0f0; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Password Test for User ID 49</h1>
    
    <div class="test-section">
        <h3>Test Password Comparison</h3>
        <p>Enter the password you're using in the switch role modal:</p>
        <input type="text" id="testPassword" placeholder="Enter password here" style="width: 200px; padding: 5px;">
        <button onclick="testPassword()">Test Password</button>
        <div id="testResult" class="result" style="display: none;"></div>
    </div>

    <div class="test-section">
        <h3>Switch Role Test</h3>
        <p>Test the actual switch role API:</p>
        <input type="text" id="switchPassword" placeholder="Enter password here" style="width: 200px; padding: 5px;">
        <button onclick="testSwitchRole()">Test Switch Role</button>
        <div id="switchResult" class="result" style="display: none;"></div>
    </div>

    <script>
        async function testPassword() {
            const password = document.getElementById('testPassword').value;
            const resultDiv = document.getElementById('testResult');
            
            try {
                const response = await fetch('get_user_password.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ password: password })
                });
                
                const data = await response.json();
                resultDiv.style.display = 'block';
                resultDiv.className = data.match ? 'result success' : 'result error';
                resultDiv.innerHTML = `
                    <strong>Result:</strong> ${data.match ? 'PASSWORD MATCHES!' : 'PASSWORD DOES NOT MATCH'}<br>
                    <strong>Input:</strong> "${data.input}"<br>
                    <strong>Database:</strong> "${data.db_password}"<br>
                    <strong>Input Length:</strong> ${data.input_length}<br>
                    <strong>DB Length:</strong> ${data.db_length}
                `;
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.innerHTML = 'Error: ' + error.message;
            }
        }

        async function testSwitchRole() {
            const password = document.getElementById('switchPassword').value;
            const resultDiv = document.getElementById('switchResult');
            
            try {
                const response = await fetch('admin-quality_assurance/api/switch_role.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        password: password,
                        target_role: 'teacher'
                    })
                });
                
                const data = await response.json();
                resultDiv.style.display = 'block';
                resultDiv.className = data.success ? 'result success' : 'result error';
                resultDiv.innerHTML = `
                    <strong>Result:</strong> ${data.success ? 'SUCCESS!' : 'FAILED'}<br>
                    <strong>Message:</strong> ${data.error || data.message}<br>
                    ${data.debug ? '<strong>Debug Info:</strong><br>' + JSON.stringify(data.debug, null, 2) : ''}
                `;
            } catch (error) {
                resultDiv.style.display = 'block';
                resultDiv.className = 'result error';
                resultDiv.innerHTML = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>

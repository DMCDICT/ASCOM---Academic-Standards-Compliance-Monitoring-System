<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Tooltip Issue</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        .debug-container {
            display: flex;
            gap: 30px;
        }

        .sidebar {
            width: 298px;
            background-color: #0C4B34;
            height: 500px;
            position: relative;
            border-radius: 10px;
            transition: width 0.4s ease;
        }

        .sidebar.collapsed {
            width: 115px;
        }

        .nav-buttons {
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 10px;
        }

        .nav-button {
            width: 100%;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            padding: 0 15px;
            box-sizing: border-box;
            color: #FFFFFF;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            position: relative;
            background-color: #0F7A53;
        }

        .nav-icon-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 45px;
            height: 45px;
        }

        .nav-tooltip {
            position: absolute;
            opacity: 0;
            visibility: hidden;
            display: none;
            pointer-events: none;
            z-index: 9999;
        }

        /* Hide text when collapsed */
        .sidebar.collapsed .nav-button > span:not(.nav-icon-wrapper) {
            opacity: 0;
            width: 0;
            margin-left: 0;
            pointer-events: none;
            user-select: none;
        }

        .debug-panel {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #ddd;
            min-width: 300px;
        }

        .test-btn {
            padding: 10px 15px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin: 5px;
        }

        .debug-info {
            background-color: #f8f9fa;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-family: monospace;
            font-size: 12px;
        }

        .log-entry {
            padding: 5px;
            margin: 2px 0;
            border-radius: 3px;
            font-size: 12px;
        }

        .log-success { background-color: #d4edda; color: #155724; }
        .log-error { background-color: #f8d7da; color: #721c24; }
        .log-info { background-color: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>Debug Tooltip Issue</h1>
    
    <div class="debug-container">
        <div class="debug-panel">
            <h3>Controls</h3>
            <button class="test-btn" onclick="toggleSidebar()">Toggle Sidebar</button>
            <button class="test-btn" onclick="testHover()">Test Hover</button>
            <button class="test-btn" onclick="forceShowTooltip()">Force Show Tooltip</button>
            <button class="test-btn" onclick="checkElements()">Check Elements</button>
            <button class="test-btn" onclick="clearLogs()">Clear Logs</button>
            
            <h3>Status</h3>
            <div class="debug-info">
                <div>Sidebar: <span id="sidebarState">Expanded</span></div>
                <div>Tooltips: <span id="tooltipCount">0</span> found</div>
                <div>Buttons: <span id="buttonCount">0</span> found</div>
            </div>
            
            <h3>Debug Log</h3>
            <div id="debugLog" style="max-height: 300px; overflow-y: auto;">
                <div class="log-entry log-info">Debug session started</div>
            </div>
        </div>

        <nav class="sidebar" id="sidebar">
            <div class="nav-buttons">
                <div class="nav-button" data-test="button1">
                    <span class="nav-icon-wrapper">
                        <span class="nav-tooltip">Dashboard Tooltip</span>
                    </span>
                    <span>Dashboard</span>
                </div>
                
                <div class="nav-button" data-test="button2">
                    <span class="nav-icon-wrapper">
                        <span class="nav-tooltip">Users Tooltip</span>
                    </span>
                    <span>Users</span>
                </div>
                
                <div class="nav-button" data-test="button3">
                    <span class="nav-icon-wrapper">
                        <span class="nav-tooltip">Settings Tooltip</span>
                    </span>
                    <span>Settings</span>
                </div>
            </div>
        </nav>
    </div>

    <script>
        let debugLog = document.getElementById('debugLog');
        
        function log(message, type = 'info') {
            const logEntry = document.createElement('div');
            logEntry.className = `log-entry log-${type}`;
            logEntry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            debugLog.appendChild(logEntry);
            debugLog.scrollTop = debugLog.scrollHeight;
            console.log(`[DEBUG] ${message}`);
        }

        function clearLogs() {
            debugLog.innerHTML = '<div class="log-entry log-info">Logs cleared</div>';
        }

        function updateStatus() {
            const sidebar = document.getElementById('sidebar');
            const isCollapsed = sidebar.classList.contains('collapsed');
            
            document.getElementById('sidebarState').textContent = isCollapsed ? 'Collapsed' : 'Expanded';
            
            const tooltips = document.querySelectorAll('.nav-tooltip');
            document.getElementById('tooltipCount').textContent = tooltips.length;
            
            const buttons = document.querySelectorAll('.nav-button');
            document.getElementById('buttonCount').textContent = buttons.length;
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const wasCollapsed = sidebar.classList.contains('collapsed');
            sidebar.classList.toggle('collapsed');
            const isNowCollapsed = sidebar.classList.contains('collapsed');
            
            log(`Sidebar toggled: ${wasCollapsed ? 'collapsed' : 'expanded'} -> ${isNowCollapsed ? 'collapsed' : 'expanded'}`);
            updateStatus();
        }

        function testHover() {
            const sidebar = document.getElementById('sidebar');
            const isCollapsed = sidebar.classList.contains('collapsed');
            log(`Testing hover (sidebar ${isCollapsed ? 'collapsed' : 'expanded'})`);
            
            const buttons = document.querySelectorAll('.nav-button');
            buttons.forEach((button, index) => {
                const tooltip = button.querySelector('.nav-tooltip');
                if (tooltip) {
                    const computedStyle = window.getComputedStyle(tooltip);
                    log(`Button ${index + 1}: opacity=${computedStyle.opacity}, visibility=${computedStyle.visibility}, display=${computedStyle.display}`);
                }
            });
        }

        function forceShowTooltip() {
            const sidebar = document.getElementById('sidebar');
            const isCollapsed = sidebar.classList.contains('collapsed');
            
            if (!isCollapsed) {
                log('Please collapse the sidebar first', 'error');
                return;
            }
            
            const buttons = document.querySelectorAll('.nav-button');
            const firstButton = buttons[0];
            const tooltip = firstButton.querySelector('.nav-tooltip');
            
            if (tooltip) {
                log(`Forcing tooltip to show: "${tooltip.textContent}"`);
                
                tooltip.style.cssText = `
                    position: absolute !important;
                    left: 100% !important;
                    top: 50% !important;
                    transform: translateY(-50%) !important;
                    background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%) !important;
                    color: #ffffff !important;
                    padding: 12px 20px !important;
                    border-radius: 12px !important;
                    font-size: 14px !important;
                    font-weight: 600 !important;
                    white-space: nowrap !important;
                    opacity: 1 !important;
                    visibility: visible !important;
                    display: block !important;
                    pointer-events: none !important;
                    z-index: 9999 !important;
                    margin-left: 20px !important;
                    box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2) !important;
                    border: 1px solid rgba(255,255,255,0.1) !important;
                    backdrop-filter: blur(10px) !important;
                    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
                    font-family: 'TT Interphases', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
                    letter-spacing: 0.5px !important;
                    text-shadow: 0 1px 2px rgba(0,0,0,0.3) !important;
                `;
                
                // Add arrow
                tooltip.innerHTML = `
                    <div style="
                        position: absolute;
                        left: -8px;
                        top: 50%;
                        transform: translateY(-50%);
                        width: 0;
                        height: 0;
                        border-top: 8px solid transparent;
                        border-bottom: 8px solid transparent;
                        border-right: 8px solid #2c3e50;
                        filter: drop-shadow(-2px 0 4px rgba(0,0,0,0.2));
                    "></div>
                    ${tooltip.textContent}
                `;
                
                log('Tooltip forced to show', 'success');
            } else {
                log('No tooltip found in first button', 'error');
            }
        }

        function checkElements() {
            const sidebar = document.getElementById('sidebar');
            const buttons = document.querySelectorAll('.nav-button');
            const tooltips = document.querySelectorAll('.nav-tooltip');
            
            log('=== ELEMENT CHECK ===');
            log(`Sidebar found: ${sidebar ? 'YES' : 'NO'}`);
            log(`Sidebar collapsed: ${sidebar.classList.contains('collapsed')}`);
            log(`Buttons found: ${buttons.length}`);
            log(`Tooltips found: ${tooltips.length}`);
            
            buttons.forEach((button, index) => {
                const tooltip = button.querySelector('.nav-tooltip');
                const buttonTest = button.getAttribute('data-test');
                log(`Button ${buttonTest}: tooltip=${tooltip ? 'YES' : 'NO'}`);
                
                if (tooltip) {
                    log(`  - Tooltip text: "${tooltip.textContent}"`);
                    log(`  - Tooltip classes: ${tooltip.className}`);
                    
                    const computedStyle = window.getComputedStyle(tooltip);
                    log(`  - Computed opacity: ${computedStyle.opacity}`);
                    log(`  - Computed visibility: ${computedStyle.visibility}`);
                    log(`  - Computed display: ${computedStyle.display}`);
                    log(`  - Computed position: ${computedStyle.position}`);
                    log(`  - Computed z-index: ${computedStyle.zIndex}`);
                }
            });
        }

        // Add hover listeners
        document.addEventListener('DOMContentLoaded', function() {
            log('Initializing debug tooltip system');
            
            const buttons = document.querySelectorAll('.nav-button');
            
            buttons.forEach((button, index) => {
                const tooltip = button.querySelector('.nav-tooltip');
                const buttonTest = button.getAttribute('data-test');
                
                button.addEventListener('mouseenter', function() {
                    const sidebar = document.getElementById('sidebar');
                    const isCollapsed = sidebar.classList.contains('collapsed');
                    log(`HOVER ENTER: Button ${buttonTest} (sidebar ${isCollapsed ? 'collapsed' : 'expanded'})`);
                    
                    if (isCollapsed && tooltip) {
                        log(`Showing tooltip ${buttonTest}: "${tooltip.textContent}"`);
                        
                        tooltip.style.cssText = `
                            position: absolute !important;
                            left: 100% !important;
                            top: 50% !important;
                            transform: translateY(-50%) !important;
                            background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%) !important;
                            color: #ffffff !important;
                            padding: 12px 20px !important;
                            border-radius: 12px !important;
                            font-size: 14px !important;
                            font-weight: 600 !important;
                            white-space: nowrap !important;
                            opacity: 0 !important;
                            visibility: visible !important;
                            display: block !important;
                            pointer-events: none !important;
                            z-index: 9999 !important;
                            margin-left: 20px !important;
                            box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 4px 16px rgba(0,0,0,0.2) !important;
                            border: 1px solid rgba(255,255,255,0.1) !important;
                            backdrop-filter: blur(10px) !important;
                            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1) !important;
                            font-family: 'TT Interphases', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif !important;
                            letter-spacing: 0.5px !important;
                            text-shadow: 0 1px 2px rgba(0,0,0,0.3) !important;
                        `;
                        
                        // Add arrow
                        tooltip.innerHTML = `
                            <div style="
                                position: absolute;
                                left: -8px;
                                top: 50%;
                                transform: translateY(-50%);
                                width: 0;
                                height: 0;
                                border-top: 8px solid transparent;
                                border-bottom: 8px solid transparent;
                                border-right: 8px solid #2c3e50;
                                filter: drop-shadow(-2px 0 4px rgba(0,0,0,0.2));
                            "></div>
                            ${tooltip.textContent}
                        `;
                        
                        // Smooth fade-in animation
                        setTimeout(() => {
                            tooltip.style.opacity = '1';
                            tooltip.style.transform = 'translateY(-50%) scale(1)';
                            log(`Tooltip ${buttonTest} animation started`);
                        }, 10);
                    }
                });
                
                button.addEventListener('mouseleave', function() {
                    log(`HOVER LEAVE: Button ${buttonTest}`);
                    
                    if (tooltip) {
                        tooltip.style.opacity = '0';
                        tooltip.style.transform = 'translateY(-50%) scale(0.95)';
                        
                        setTimeout(() => {
                            tooltip.style.visibility = 'hidden';
                            tooltip.style.display = 'none';
                            tooltip.innerHTML = tooltip.textContent;
                            log(`Tooltip ${buttonTest} hidden`);
                        }, 300);
                    }
                });
            });
            
            updateStatus();
            log('Debug tooltip system initialized', 'success');
        });
    </script>
</body>
</html>

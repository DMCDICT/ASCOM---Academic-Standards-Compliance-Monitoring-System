  #     - REDIS_PORT=6379
  #   volumes:
  #     - ./docker/socketio:/app
  #   depends_on:
  #     - redis
  #   networks:
  #     - ascom-backend

  # ============================================
  # Node.js for Frontend Build (Phase 3 - React)
  # ============================================
  # node:
  #   image: node:20-alpine
  #   container_name: ascom_node
  #   restart: unless-stopped
  #   working_dir: /app
  #   volumes:
  #     - ./:/app
  #   command: sh -c "npm install && npm run dev"
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - NODE_ENV=development
  #     - VITE_DEV_HOST=0.0.0.0
  #   networks:
  #     - ascom-backend

networks:
  ascom-backend:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16

volumes:
  ascom_db_data:
  ascom_redis_data:
  ascom_storage:
  ascom_cache:
  phpmyadmin_sessions:
<!DOCTYPE html>
<html>
<head>
    <title>Modal Debug Test</title>
    <style>
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }
        .modal-box {
            background: white;
            padding: 20px;
            border-radius: 8px;
            min-width: 300px;
        }
        .close-button {
            float: right;
            cursor: pointer;
            font-size: 24px;
        }
        button {
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Modal Debug Test</h1>
    
    <button onclick="testModal()">Test Modal</button>
    <button onclick="testModal2()">Test Modal 2</button>
    <button onclick="checkModal()">Check if Modal Exists</button>
    
    <div id="addUserModal" class="modal-overlay">
        <div class="modal-box">
            <span class="close-button" onclick="closeModal()">&times;</span>
            <h2>Test Modal</h2>
            <p>This is a test modal to see if it works.</p>
        </div>
    </div>

    <script>
        function testModal() {
            console.log('testModal called');
            const modal = document.getElementById('addUserModal');
            console.log('Modal element:', modal);
            if (modal) {
                modal.style.display = 'flex';
                console.log('Modal opened');
            } else {
                console.error('Modal not found');
                alert('Modal not found');
            }
        }
        
        function testModal2() {
            console.log('testModal2 called');
            const modal = document.getElementById('addUserModal');
            if (modal) {
                modal.style.display = 'flex';
                console.log('Modal opened');
            } else {
                console.error('Modal not found');
                alert('Modal not found');
            }
        }
        
        function closeModal() {
            const modal = document.getElementById('addUserModal');
            if (modal) {
                modal.style.display = 'none';
            }
        }
        
        function checkModal() {
            const modal = document.getElementById('addUserModal');
            console.log('Modal exists:', !!modal);
            if (modal) {
                console.log('Modal display:', modal.style.display);
                console.log('Modal classes:', modal.className);
            }
        }
        
        // Check on page load
        window.onload = function() {
            console.log('Page loaded');
            checkModal();
        };
    </script>
</body>
</html>

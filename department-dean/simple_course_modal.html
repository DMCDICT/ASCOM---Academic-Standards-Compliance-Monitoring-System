<!DOCTYPE html>
<html>
<head>
    <title>Simple Course Modal Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-button { 
            background: #4CAF50; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            margin: 10px;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-box {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            max-width: 600px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0px 0px;
            border-bottom: 1px solid #e9ecef;
        }
        .modal-header h2 {
            margin: 0;
            font-size: 1.5rem;
            color: #333;
        }
        .close-button {
            font-size: 24px;
            cursor: pointer;
            color: #999;
            line-height: 1;
        }
        .form-grid {
            padding: 24px;
        }
        .form-row {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }
        .form-group {
            flex: 1;
        }
        .form-group.course-code-width {
            flex: 0 0 20%;
            max-width: 20%;
        }
        .form-group.course-name-width {
            flex: 0 0 73%;
            max-width: 73%;
        }
        .form-group.long-width {
            flex: 0 0 78%;
            max-width: 78%;
        }
        .form-group.small-width {
            flex: 0 0 15%;
            max-width: 15%;
        }
        .form-group.medium-width {
            flex: 0 0 30%;
            max-width: 30%;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #333;
        }
        .required {
            color: #e74c3c;
        }
        .form-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .form-control:focus {
            outline: none;
            border-color: #6f42c1;
            box-shadow: 0 0 0 2px rgba(111, 66, 193, 0.1);
        }
        .program-select-container {
            position: relative;
        }
        .program-select-btn {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: white;
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.2s;
        }
        .program-select-btn:hover {
            border-color: #6f42c1;
        }
        .dropdown-arrow {
            color: #999;
            font-size: 12px;
        }
        .form-actions {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }
        .cancel-btn, .create-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cancel-btn {
            background: #f8f9fa;
            color: #6c757d;
            border: 1px solid #dee2e6;
        }
        .create-btn {
            background: #4CAF50;
            color: white;
        }
        .create-btn:hover:not(:disabled) {
            background: #45a049;
        }
        .create-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <h1>Simple Course Modal Test</h1>
    <button class="test-button" onclick="openModal()">Open Course Modal</button>
    <button class="test-button" onclick="testAPIs()">Test APIs</button>
    
    <div id="result" style="background: #f0f0f0; padding: 10px; margin: 10px 0; border-radius: 4px; white-space: pre-wrap;">Click buttons to test...</div>

    <!-- Simple Course Modal -->
    <div id="addCourseModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <h2>New Course</h2>
                <span class="close-button" onclick="closeModal()">&times;</span>
            </div>
            
            <form id="addCourseForm" class="form-grid">
                <div class="form-row">
                    <div class="form-group course-code-width">
                        <label for="courseCode">Course Code <span class="required">*</span></label>
                        <input type="text" id="courseCode" name="course_code" class="form-control" placeholder="e.g., IT101" required>
                    </div>
                    <div class="form-group course-name-width">
                        <label for="courseName">Course Name <span class="required">*</span></label>
                        <input type="text" id="courseName" name="course_name" class="form-control" placeholder="e.g., Introduction to Programming" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group long-width">
                        <label for="programs">Program(s) <span class="required">*</span></label>
                        <div class="program-select-container">
                            <button type="button" id="openProgramSelectModalBtn" class="program-select-btn" onclick="loadPrograms()">
                                <span id="programButtonText">Select Program(s) - No Program Selected</span>
                                <span class="dropdown-arrow">▼</span>
                            </button>
                            <input type="hidden" id="selectedProgramsInput" name="programs" value="">
                        </div>
                    </div>
                    <div class="form-group small-width">
                        <label for="units">Units <span class="required">*</span></label>
                        <input type="number" id="units" name="units" class="form-control" min="1" max="6" placeholder="3" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group medium-width">
                        <label for="schoolTerm">Academic Term <span class="required">*</span></label>
                        <select id="schoolTerm" name="school_term" class="form-control" required>
                            <option value="">Select Term</option>
                            <option value="1st Semester">1st Semester</option>
                            <option value="2nd Semester">2nd Semester</option>
                            <option value="Summer Semester">Summer Semester</option>
                        </select>
                    </div>
                    <div class="form-group medium-width">
                        <label for="schoolYear">Academic Year <span class="required">*</span></label>
                        <select id="schoolYear" name="school_year" class="form-control" required>
                            <option value="">Select Academic Year</option>
                        </select>
                    </div>
                    <div class="form-group medium-width">
                        <label for="yearLevel">Year Level <span class="required">*</span></label>
                        <select id="yearLevel" name="year_level" class="form-control" required>
                            <option value="">Select Year Level</option>
                            <option value="1">1st Year</option>
                            <option value="2">2nd Year</option>
                            <option value="3">3rd Year</option>
                            <option value="4">4th Year</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="button" class="cancel-btn" onclick="closeModal()">CANCEL</button>
                    <button type="submit" class="create-btn" id="createCourseBtn" disabled>CREATE</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function openModal() {
            console.log('Opening modal...');
            document.getElementById('addCourseModal').style.display = 'flex';
            loadSchoolYears();
        }
        
        function closeModal() {
            document.getElementById('addCourseModal').style.display = 'none';
        }
        
        async function loadSchoolYears() {
            const result = document.getElementById('result');
            result.textContent = 'Loading school years...';
            
            try {
                const response = await fetch('api/get_school_years.php');
                const data = await response.json();
                
                if (data.success && data.school_years) {
                    const schoolYearSelect = document.getElementById('schoolYear');
                    schoolYearSelect.innerHTML = '<option value="">Select Academic Year</option>';
                    
                    data.school_years.forEach(year => {
                        const option = document.createElement('option');
                        option.value = year.id;
                        option.textContent = year.school_year;
                        schoolYearSelect.appendChild(option);
                    });
                    
                    result.textContent = 'School years loaded: ' + data.school_years.length + ' years';
                } else {
                    result.textContent = 'Failed to load school years: ' + JSON.stringify(data);
                }
            } catch (error) {
                result.textContent = 'Error loading school years: ' + error.message;
            }
        }
        
        async function loadPrograms() {
            const result = document.getElementById('result');
            result.textContent = 'Loading programs...';
            
            try {
                const response = await fetch('get_dean_programs.php');
                const data = await response.json();
                
                if (data.success && data.programs) {
                    result.textContent = 'Programs loaded: ' + data.programs.length + ' programs\n' + 
                        data.programs.map(p => p.program_name).join(', ');
                } else {
                    result.textContent = 'Failed to load programs: ' + JSON.stringify(data);
                }
            } catch (error) {
                result.textContent = 'Error loading programs: ' + error.message;
            }
        }
        
        async function testAPIs() {
            const result = document.getElementById('result');
            result.textContent = 'Testing both APIs...';
            
            try {
                // Test school years
                const schoolYearsResponse = await fetch('api/get_school_years.php');
                const schoolYearsData = await schoolYearsResponse.json();
                
                // Test programs
                const programsResponse = await fetch('get_dean_programs.php');
                const programsData = await programsResponse.json();
                
                result.textContent = 'School Years: ' + JSON.stringify(schoolYearsData, null, 2) + 
                    '\n\nPrograms: ' + JSON.stringify(programsData, null, 2);
            } catch (error) {
                result.textContent = 'API Test Error: ' + error.message;
            }
        }
    </script>
</body>
</html>

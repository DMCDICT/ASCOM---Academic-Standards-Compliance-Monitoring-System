<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        .test-button {
            padding: 15px 30px;
            background: #1976d2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        .test-button:hover {
            background: #1565c0;
        }
        .debug-info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 4px solid #1976d2;
        }
    </style>
</head>
<body>
    <h1>Modal Test Page</h1>
    
    <div class="debug-info">
        <h3>Debug Information:</h3>
        <p>This page tests if modals work at all.</p>
        <div id="debug-output">Click a test button to see results...</div>
    </div>
    
    <button class="test-button" onclick="testModalExists()">Test 1: Check if Modal Exists</button>
    <button class="test-button" onclick="testOpenModal()">Test 2: Open Modal</button>
    <button class="test-button" onclick="testCloseModal()">Test 3: Close Modal</button>
    <button class="test-button" onclick="testEditCourseFunction()">Test 4: Call editCourse()</button>
    
    <hr style="margin: 30px 0;">
    
    <!-- SIMPLE WORKING MODAL -->
    <div id="editCourseModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000;">
        <div style="background: white; margin: 50px auto; padding: 30px; width: 600px; border-radius: 10px; max-height: 80vh; overflow-y: auto;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0; color: #333;">Edit Course - TEST MODAL</h2>
                <button onclick="closeEditCourseModal()" style="background: none; border: none; font-size: 24px; cursor: pointer; color: #666;">&times;</button>
            </div>
            
            <form id="editCourseForm">
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Course Code:</label>
                    <input type="text" id="edit_course_code" name="course_code" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;" required>
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Course Name:</label>
                    <input type="text" id="edit_course_name" name="course_name" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;" required>
                </div>
                
                <div style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 5px; font-weight: bold;">Units:</label>
                    <input type="number" id="edit_units" name="units" min="1" max="10" style="width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px;" required>
                </div>
                
                <div style="display: flex; gap: 10px; justify-content: flex-end;">
                    <button type="button" onclick="closeEditCourseModal()" style="padding: 10px 20px; background: #6c757d; color: white; border: none; border-radius: 5px; cursor: pointer;">CANCEL</button>
                    <button type="submit" id="updateCourseBtn" style="padding: 10px 20px; background: #1976d2; color: white; border: none; border-radius: 5px; cursor: pointer;">UPDATE</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Debug output function
        function addDebugOutput(message) {
            const debugDiv = document.getElementById('debug-output');
            const timestamp = new Date().toLocaleTimeString();
            debugDiv.innerHTML += `<div>[${timestamp}] ${message}</div>`;
            console.log(message);
        }
        
        // Test 1: Check if modal exists
        function testModalExists() {
            addDebugOutput('🔍 Testing if modal exists...');
            const modal = document.getElementById('editCourseModal');
            if (modal) {
                addDebugOutput('✅ Modal found: ' + modal.tagName + ' with id: ' + modal.id);
                addDebugOutput('✅ Modal style display: ' + modal.style.display);
                addDebugOutput('✅ Modal computed display: ' + window.getComputedStyle(modal).display);
            } else {
                addDebugOutput('❌ Modal NOT found!');
            }
        }
        
        // Test 2: Open modal
        function testOpenModal() {
            addDebugOutput('🔍 Testing modal open...');
            const modal = document.getElementById('editCourseModal');
            if (modal) {
                modal.style.display = 'block';
                addDebugOutput('✅ Modal display set to: ' + modal.style.display);
                addDebugOutput('✅ Modal should be visible now');
            } else {
                addDebugOutput('❌ Cannot open modal - not found!');
            }
        }
        
        // Test 3: Close modal
        function testCloseModal() {
            addDebugOutput('🔍 Testing modal close...');
            const modal = document.getElementById('editCourseModal');
            if (modal) {
                modal.style.display = 'none';
                addDebugOutput('✅ Modal display set to: ' + modal.style.display);
                addDebugOutput('✅ Modal should be hidden now');
            } else {
                addDebugOutput('❌ Cannot close modal - not found!');
            }
        }
        
        // Test 4: Call editCourse function
        function testEditCourseFunction() {
            addDebugOutput('🔍 Testing editCourse function...');
            if (typeof editCourse === 'function') {
                addDebugOutput('✅ editCourse function exists');
                try {
                    editCourse('TEST123');
                    addDebugOutput('✅ editCourse function called successfully');
                } catch (error) {
                    addDebugOutput('❌ Error calling editCourse: ' + error.message);
                }
            } else {
                addDebugOutput('❌ editCourse function does not exist');
                addDebugOutput('🔍 Available functions: ' + Object.keys(window).filter(key => typeof window[key] === 'function').join(', '));
            }
        }
        
        // Simple editCourse function
        function editCourse(courseCode) {
            addDebugOutput('🔧 editCourse called with: ' + courseCode);
            const modal = document.getElementById('editCourseModal');
            if (modal) {
                modal.style.display = 'block';
                addDebugOutput('✅ Modal opened via editCourse');
            } else {
                addDebugOutput('❌ Modal not found in editCourse');
            }
        }
        
        // Simple close function
        function closeEditCourseModal() {
            addDebugOutput('🔧 closeEditCourseModal called');
            const modal = document.getElementById('editCourseModal');
            if (modal) {
                modal.style.display = 'none';
                addDebugOutput('✅ Modal closed');
            } else {
                addDebugOutput('❌ Modal not found in closeEditCourseModal');
            }
        }
        
        // Auto-test on page load
        document.addEventListener('DOMContentLoaded', function() {
            addDebugOutput('🚀 Page loaded, running auto-tests...');
            
            // Auto-test modal existence
            setTimeout(() => {
                testModalExists();
            }, 500);
        });
    </script>
</body>
</html>

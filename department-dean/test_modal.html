<!DOCTYPE html>
<html>
<head>
    <title>Test Modal</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-button { 
            background: #4CAF50; 
            color: white; 
            padding: 10px 20px; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            margin: 10px;
        }
        .test-button:hover { background: #45a049; }
        .result { 
            background: #f0f0f0; 
            padding: 10px; 
            margin: 10px 0; 
            border-radius: 4px; 
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
    <h1>Test Modal APIs</h1>
    
    <button class="test-button" onclick="testSchoolYears()">Test School Years API</button>
    <button class="test-button" onclick="testPrograms()">Test Programs API</button>
    <button class="test-button" onclick="testModal()">Test Modal</button>
    
    <div id="result" class="result">Click buttons to test...</div>

    <script>
        async function testSchoolYears() {
            const result = document.getElementById('result');
            result.textContent = 'Testing School Years API...';
            
            try {
                const response = await fetch('api/get_school_years.php');
                const data = await response.json();
                result.textContent = 'School Years API Response:\n' + JSON.stringify(data, null, 2);
            } catch (error) {
                result.textContent = 'School Years API Error: ' + error.message;
            }
        }
        
        async function testPrograms() {
            const result = document.getElementById('result');
            result.textContent = 'Testing Programs API...';
            
            try {
                const response = await fetch('get_dean_programs.php');
                const data = await response.json();
                result.textContent = 'Programs API Response:\n' + JSON.stringify(data, null, 2);
            } catch (error) {
                result.textContent = 'Programs API Error: ' + error.message;
            }
        }
        
        function testModal() {
            const result = document.getElementById('result');
            result.textContent = 'Testing Modal...';
            
            // Create a simple modal test
            const modal = document.createElement('div');
            modal.style.cssText = `
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.5);
                display: flex;
                justify-content: center;
                align-items: center;
                z-index: 1000;
            `;
            
            const modalContent = document.createElement('div');
            modalContent.style.cssText = `
                background: white;
                padding: 20px;
                border-radius: 8px;
                max-width: 500px;
                width: 90%;
            `;
            
            modalContent.innerHTML = `
                <h2>Test Modal</h2>
                <p>This is a test modal to verify JavaScript is working.</p>
                <button onclick="this.closest('.modal').remove()">Close</button>
            `;
            
            modal.className = 'modal';
            modal.appendChild(modalContent);
            document.body.appendChild(modal);
            
            result.textContent = 'Modal test completed - check if modal appeared.';
        }
    </script>
</body>
</html>

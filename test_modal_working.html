<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Modal Working</title>
    <style>
        body {
            font-family: 'TT Interphases', sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .test-container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .test-button {
            background-color: #0f7a53;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        .test-button:hover {
            background-color: #0a5a3f;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Test Modal Functionality</h1>
        
        <div>
            <button class="test-button" onclick="testModalOpen()">Test Open Modal</button>
            <button class="test-button" onclick="testBackendConnection()">Test Backend Connection</button>
            <button class="test-button" onclick="testFormSubmission()">Test Form Submission</button>
        </div>
        
        <div id="status"></div>
    </div>

    <script>
        function showStatus(message, type = 'success') {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
        }

        function testModalOpen() {
            showStatus('Testing modal open functionality...', 'success');
            
            // Check if the modal exists
            const modal = document.getElementById('addDepartmentModal');
            if (modal) {
                showStatus('✅ Modal element found!', 'success');
                modal.style.display = 'flex';
                setTimeout(() => {
                    modal.style.display = 'none';
                    showStatus('✅ Modal open/close test passed!', 'success');
                }, 2000);
            } else {
                showStatus('❌ Modal element not found!', 'error');
            }
        }

        function testBackendConnection() {
            showStatus('Testing backend connection...', 'success');
            
            fetch('./super_admin-mis/process_add_department.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: 'department_code=TEST&department_name=Test Department&color_code=%234A7DFF'
            })
            .then(response => {
                console.log('Response status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('Response data:', data);
                if (data.success) {
                    showStatus('✅ Backend connection working! Department created successfully.', 'success');
                } else {
                    showStatus(`✅ Backend connection working! Response: ${data.message}`, 'success');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showStatus(`❌ Backend connection failed: ${error.message}`, 'error');
            });
        }

        function testFormSubmission() {
            showStatus('Testing form submission...', 'success');
            
            // Create a test form
            const formData = new FormData();
            formData.append('department_code', 'TEST' + Date.now());
            formData.append('department_name', 'Test Department ' + Date.now());
            formData.append('color_code', '#4A7DFF');
            
            fetch('./super_admin-mis/process_add_department.php', {
                method: 'POST',
                body: formData
            })
            .then(response => {
                console.log('Response status:', response.status);
                return response.json();
            })
            .then(data => {
                console.log('Response data:', data);
                if (data.success) {
                    showStatus('✅ Form submission working! Department created successfully.', 'success');
                } else {
                    showStatus(`✅ Form submission working! Response: ${data.message}`, 'success');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                showStatus(`❌ Form submission failed: ${error.message}`, 'error');
            });
        }

        // Check if we're on the right page
        if (window.location.pathname.includes('super_admin-mis')) {
            showStatus('✅ You are on the correct page (super_admin-mis)', 'success');
        } else {
            showStatus('⚠️ You are not on the super_admin-mis page. Please navigate to the correct page.', 'error');
        }
    </script>
</body>
</html>

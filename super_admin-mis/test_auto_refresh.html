<!DOCTYPE html>
<html>
<head>
    <title>Test Auto-Refresh</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        .refresh-button {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            margin-left: 10px;
            transition: background-color 0.3s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            position: relative;
        }
        .refresh-status-icon {
            font-size: 14px;
            margin-left: 4px;
            opacity: 0;
            transition: opacity 0.3s ease;
            animation: spin 1s linear infinite;
        }
        .refresh-status-icon.show {
            opacity: 1;
        }
        .auto-refresh-indicator {
            font-size: 14px;
            margin-left: 6px;
            opacity: 0.7;
            animation: spin 2s linear infinite;
            cursor: pointer;
            transition: opacity 0.3s ease;
            display: none;
        }
        .auto-refresh-indicator.active {
            display: inline;
        }
        .auto-refresh-indicator.inactive {
            opacity: 0.3;
            animation: none;
            display: none;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>Auto-Refresh Test</h1>
    
    <div class="test-section info">
        <h2>Current Time</h2>
        <div id="currentTime"></div>
    </div>
    
    <div class="test-section">
        <h2>Refresh Button Test</h2>
        <button class="refresh-button" onclick="testManualRefresh()">
            🔄 Refresh
            <span id="refreshStatusIcon" class="refresh-status-icon" style="display: none;">⏳</span>
            <span id="autoRefreshIndicator" class="auto-refresh-indicator" title="Auto-refresh active (every 30s)">⏳</span>
        </button>
        <div id="refreshResults"></div>
    </div>
    
    <div class="test-section">
        <h2>Auto-Refresh Status</h2>
        <button onclick="checkStatus()">Check Auto-Refresh Status</button>
        <button onclick="toggleAutoRefresh()">Toggle Auto-Refresh</button>
        <div id="statusResults"></div>
    </div>
    
    <div class="test-section">
        <h2>Console Log</h2>
        <div id="consoleLog"></div>
    </div>

    <script>
        // Override console.log to capture output
        const originalLog = console.log;
        const originalError = console.error;
        const logDiv = document.getElementById('consoleLog');
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            logDiv.innerHTML += '<div class="info">LOG: ' + args.join(' ') + '</div>';
            logDiv.scrollTop = logDiv.scrollHeight;
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            logDiv.innerHTML += '<div class="error">ERROR: ' + args.join(' ') + '</div>';
            logDiv.scrollTop = logDiv.scrollHeight;
        };
        
        // Update current time
        function updateTime() {
            document.getElementById('currentTime').innerHTML = new Date().toLocaleTimeString();
        }
        setInterval(updateTime, 1000);
        updateTime();
        
        // Test manual refresh
        function testManualRefresh() {
            const results = document.getElementById('refreshResults');
            results.innerHTML = '<div class="info">Testing manual refresh...</div>';
            
            if (typeof window.manualRefreshUserList === 'function') {
                results.innerHTML += '<div class="success">✅ manualRefreshUserList function exists</div>';
                try {
                    window.manualRefreshUserList();
                    results.innerHTML += '<div class="success">✅ Manual refresh called successfully</div>';
                } catch (error) {
                    results.innerHTML += '<div class="error">❌ Error: ' + error.message + '</div>';
                }
            } else {
                results.innerHTML += '<div class="error">❌ manualRefreshUserList function does not exist</div>';
            }
        }
        
        // Check auto-refresh status
        function checkStatus() {
            const results = document.getElementById('statusResults');
            results.innerHTML = '<div class="info">Checking auto-refresh status...</div>';
            
            if (typeof window.checkAutoRefreshStatus === 'function') {
                const isActive = window.checkAutoRefreshStatus();
                results.innerHTML += '<div class="success">✅ Auto-refresh status check completed</div>';
                results.innerHTML += '<div class="info">Auto-refresh active: ' + (isActive ? 'Yes' : 'No') + '</div>';
            } else {
                results.innerHTML += '<div class="error">❌ checkAutoRefreshStatus function does not exist</div>';
            }
        }
        
        // Toggle auto-refresh
        function toggleAutoRefresh() {
            const results = document.getElementById('statusResults');
            results.innerHTML = '<div class="info">Toggling auto-refresh...</div>';
            
            if (typeof window.toggleAutoRefresh === 'function') {
                try {
                    const isActive = window.toggleAutoRefresh();
                    results.innerHTML += '<div class="success">✅ Auto-refresh toggled</div>';
                    results.innerHTML += '<div class="info">Auto-refresh now: ' + (isActive ? 'ON' : 'OFF') + '</div>';
                } catch (error) {
                    results.innerHTML += '<div class="error">❌ Error: ' + error.message + '</div>';
                }
            } else {
                results.innerHTML += '<div class="error">❌ toggleAutoRefresh function does not exist</div>';
            }
        }
        
        // Run tests when page loads
        window.addEventListener('DOMContentLoaded', function() {
            console.log('Auto-refresh test page loaded');
            console.log('Testing function availability...');
            
            const functions = ['manualRefreshUserList', 'refreshUserList', 'toggleAutoRefresh', 'checkAutoRefreshStatus'];
            functions.forEach(func => {
                if (typeof window[func] === 'function') {
                    console.log('✅ ' + func + ' is available');
                } else {
                    console.log('❌ ' + func + ' is NOT available');
                }
            });
        });
    </script>
    
    <!-- Include the JavaScript files -->
    <script src="./scripts/user-account-management.js?v=1.9"></script>
</body>
</html>

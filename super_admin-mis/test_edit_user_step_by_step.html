<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Edit User Step by Step</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        .success { background-color: #d4edda; border-color: #c3e6cb; }
        .error { background-color: #f8d7da; border-color: #f5c6cb; }
        .info { background-color: #d1ecf1; border-color: #bee5eb; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
        #output { margin-top: 20px; padding: 15px; background-color: #f8f9fa; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Test Edit User Modal Step by Step</h1>
    
    <div class="test-section info">
        <h3>Step 1: Test Basic JavaScript Loading</h3>
        <button onclick="testBasicJS()">Test Basic JavaScript</button>
        <div id="step1-output"></div>
    </div>
    
    <div class="test-section info">
        <h3>Step 2: Test Modal Element Existence</h3>
        <button onclick="testModalElement()">Test Modal Element</button>
        <div id="step2-output"></div>
    </div>
    
    <div class="test-section info">
        <h3>Step 3: Test API Endpoint</h3>
        <input type="text" id="testEmployeeNo" placeholder="Enter employee number" value="150644">
        <button onclick="testAPI()">Test API</button>
        <div id="step3-output"></div>
    </div>
    
    <div class="test-section info">
        <h3>Step 4: Test Full Modal Function</h3>
        <button onclick="testFullModal()">Test Full Modal</button>
        <div id="step4-output"></div>
    </div>
    
    <div id="output"></div>
    
    <script>
        function log(message, type = 'info') {
            const output = document.getElementById('output');
            const timestamp = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.innerHTML = `<strong>[${timestamp}]</strong> ${message}`;
            div.className = type;
            output.appendChild(div);
            console.log(message);
        }
        
        function testBasicJS() {
            log('Testing basic JavaScript...', 'info');
            const output = document.getElementById('step1-output');
            
            try {
                // Test if basic JavaScript is working
                const testVar = 'JavaScript is working!';
                output.innerHTML = `<div class="success">✅ ${testVar}</div>`;
                log('✅ Basic JavaScript is working', 'success');
            } catch (error) {
                output.innerHTML = `<div class="error">❌ JavaScript error: ${error.message}</div>`;
                log('❌ JavaScript error: ' + error.message, 'error');
            }
        }
        
        function testModalElement() {
            log('Testing modal element existence...', 'info');
            const output = document.getElementById('step2-output');
            
            try {
                // Check if modal element exists
                const modal = document.getElementById('editUserModal');
                if (modal) {
                    output.innerHTML = `<div class="success">✅ Modal element found: ${modal.id}</div>`;
                    log('✅ Modal element found: ' + modal.id, 'success');
                    
                    // Check modal properties
                    const display = window.getComputedStyle(modal).display;
                    const visibility = window.getComputedStyle(modal).visibility;
                    output.innerHTML += `<div class="info">Modal display: ${display}, visibility: ${visibility}</div>`;
                    log(`Modal display: ${display}, visibility: ${visibility}`, 'info');
                } else {
                    output.innerHTML = `<div class="error">❌ Modal element not found</div>`;
                    log('❌ Modal element not found', 'error');
                    
                    // List all elements with "edit" in ID
                    const editElements = document.querySelectorAll('[id*="edit"]');
                    if (editElements.length > 0) {
                        output.innerHTML += `<div class="info">Elements with "edit" in ID:</div>`;
                        editElements.forEach(el => {
                            output.innerHTML += `<div class="info">- ${el.id}</div>`;
                            log(`Found element: ${el.id}`, 'info');
                        });
                    }
                }
            } catch (error) {
                output.innerHTML = `<div class="error">❌ Error testing modal: ${error.message}</div>`;
                log('❌ Error testing modal: ' + error.message, 'error');
            }
        }
        
        async function testAPI() {
            log('Testing API endpoint...', 'info');
            const output = document.getElementById('step3-output');
            const employeeNo = document.getElementById('testEmployeeNo').value;
            
            if (!employeeNo) {
                output.innerHTML = `<div class="error">❌ Please enter an employee number</div>`;
                return;
            }
            
            try {
                output.innerHTML = `<div class="info">Testing API with employee number: ${employeeNo}</div>`;
                log(`Testing API with employee number: ${employeeNo}`, 'info');
                
                const response = await fetch(`./api/get_user_data.php?employee_no=${employeeNo}`);
                log(`API response status: ${response.status}`, 'info');
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                log(`API response data:`, 'info');
                console.log('API response:', data);
                
                if (data.success && data.data) {
                    output.innerHTML += `<div class="success">✅ API call successful!</div>`;
                    output.innerHTML += `<div class="info">User: ${data.data.first_name} ${data.data.last_name}</div>`;
                    output.innerHTML += `<div class="info">Department: ${data.data.department_name}</div>`;
                    log('✅ API call successful', 'success');
                } else {
                    output.innerHTML += `<div class="error">❌ API call failed: ${data.message}</div>`;
                    log('❌ API call failed: ' + data.message, 'error');
                }
            } catch (error) {
                output.innerHTML += `<div class="error">❌ API error: ${error.message}</div>`;
                log('❌ API error: ' + error.message, 'error');
            }
        }
        
        function testFullModal() {
            log('Testing full modal function...', 'info');
            const output = document.getElementById('step4-output');
            
            try {
                // Check if the function exists
                if (typeof window.openEditUserModal === 'function') {
                    output.innerHTML = `<div class="success">✅ openEditUserModal function exists</div>`;
                    log('✅ openEditUserModal function exists', 'success');
                    
                    // Try to call it
                    const employeeNo = document.getElementById('testEmployeeNo').value || '150644';
                    log(`Calling openEditUserModal with: ${employeeNo}`, 'info');
                    window.openEditUserModal(employeeNo);
                    
                    output.innerHTML += `<div class="info">✅ Function called successfully</div>`;
                    log('✅ Function called successfully', 'success');
                } else {
                    output.innerHTML = `<div class="error">❌ openEditUserModal function does not exist</div>`;
                    log('❌ openEditUserModal function does not exist', 'error');
                }
            } catch (error) {
                output.innerHTML += `<div class="error">❌ Error testing modal: ${error.message}</div>`;
                log('❌ Error testing modal: ' + error.message, 'error');
            }
        }
        
        // Auto-run basic tests when page loads
        window.addEventListener('load', function() {
            log('Page loaded, running basic tests...', 'info');
            setTimeout(() => {
                testBasicJS();
                testModalElement();
            }, 1000);
        });
    </script>
    
    <!-- Include the modal HTML -->
    <div id="editUserModal" class="modal-overlay" style="display: none; align-items: center; justify-content: center;">
        <div class="modal-box" style="background-color: #EFEFEF; padding: 25px; border: 1px solid #888; border-radius: 15px; width: 90%; max-width: 600px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3); animation: fadeIn 0.3s; max-height: 98vh; overflow-y: visible;">
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e5e5e5; padding-bottom: 15px; margin-bottom: 20px;">
                <h2 style="margin: 0; font-size: 22px; font-weight: 700; color: #333;">Edit User Account</h2>
                <span onclick="closeEditUserModal()" style="color: #aaa; font-size: 28px; font-weight: 700; cursor: pointer; transition: color 0.2s;">&times;</span>
            </div>
            <div style="text-align: center; padding: 40px;">
                <h3>Test Modal</h3>
                <p>This is a test modal to verify the JavaScript is working.</p>
                <button onclick="closeEditUserModal()">Close Modal</button>
            </div>
        </div>
    </div>
    
    <!-- Include the JavaScript files -->
    <script src="./scripts/modal-edit-user.js"></script>
    
    <script>
        // Simple close function for testing
        function closeEditUserModal() {
            const modal = document.getElementById('editUserModal');
            if (modal) {
                modal.style.display = 'none';
                console.log('Modal closed');
            }
        }
    </script>
</body>
</html>

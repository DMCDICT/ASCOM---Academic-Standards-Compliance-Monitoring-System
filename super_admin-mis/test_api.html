<!DOCTYPE html>
<html>
<head>
    <title>Test School Year Events API</title>
</head>
<body>
    <h1>Test School Year Events API</h1>
    <button onclick="testAPI()">Test API</button>
    <div id="result"></div>

    <script>
        async function testAPI() {
            try {
                const response = await fetch('api/get_school_year_events.php');
                const data = await response.json();
                
                document.getElementById('result').innerHTML = 
                    '<h3>API Response:</h3><pre>' + JSON.stringify(data, null, 2) + '</pre>';
                
                console.log('API Response:', data);
            } catch (error) {
                document.getElementById('result').innerHTML = 
                    '<h3>Error:</h3><pre>' + error.message + '</pre>';
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>

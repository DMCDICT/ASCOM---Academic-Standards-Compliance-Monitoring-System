<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Tab Close Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .log { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 5px; max-height: 300px; overflow-y: auto; }
        button { padding: 10px 15px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Simple Tab Close Test</h1>
    <p>This page tests the tab close logout functionality.</p>
    <p><strong>Instructions:</strong></p>
    <ol>
        <li>Open browser console (F12)</li>
        <li>Click "Test Tab Close" to manually trigger logout</li>
        <li>Actually close this tab to test automatic logout</li>
        <li>Check the logs below and console for results</li>
    </ol>
    
    <button onclick="testTabClose()">Test Tab Close</button>
    <button onclick="clearLog()">Clear Log</button>
    <div id="log" class="log"></div>

    <script>
        // Simulate current user
        const currentUser = '178565';
        
        function addToLog(message) {
            const log = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            log.innerHTML += `<div>[${timestamp}] ${message}</div>`;
            log.scrollTop = log.scrollHeight;
        }
        
        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }
        
        function testTabClose() {
            addToLog('🚪 Testing tab close logout...');
            
            const logoutData = {
                employee_no: currentUser
            };
            
            addToLog(`📤 Sending logout data: ${JSON.stringify(logoutData)}`);
            
            // Use fetch for testing
            fetch('./logout_on_tab_close.php', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(logoutData)
            })
            .then(response => response.json())
            .then(data => {
                addToLog(`✅ Logout response: ${JSON.stringify(data)}`);
            })
            .catch(error => {
                addToLog(`❌ Logout failed: ${error.message}`);
            });
        }
        
        // Add beforeunload event listener
        window.addEventListener('beforeunload', function(e) {
            addToLog('🚪 Tab closing, logging out user...');
            
            const logoutData = {
                employee_no: currentUser
            };
            
            addToLog(`📤 Sending logout data: ${JSON.stringify(logoutData)}`);
            
            // Use sendBeacon for reliable delivery during page unload
            if (navigator.sendBeacon) {
                const blob = new Blob([JSON.stringify(logoutData)], {type: 'application/json'});
                const success = navigator.sendBeacon('./logout_on_tab_close.php', blob);
                addToLog(`📡 SendBeacon result: ${success}`);
            } else {
                // Fallback for older browsers
                const xhr = new XMLHttpRequest();
                xhr.open('POST', './logout_on_tab_close.php', false);
                xhr.setRequestHeader('Content-Type', 'application/json');
                xhr.send(JSON.stringify(logoutData));
                addToLog('📡 XHR fallback used');
            }
            
            addToLog(`✅ Logout request sent for user: ${currentUser}`);
        });
        
        // Add visibility change event listener
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'hidden') {
                addToLog('👁️ Page hidden (tab switch or close)');
            } else {
                addToLog('👁️ Page visible');
            }
        });
        
        addToLog('🚀 Simple tab close test page loaded');
        addToLog(`👤 Current user: ${currentUser}`);
    </script>
</body>
</html>

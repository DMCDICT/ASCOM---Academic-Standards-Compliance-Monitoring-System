<!DOCTYPE html>
<html>
<head>
    <title>Test User Modal</title>
</head>
<body>
    <h1>Test User Modal</h1>
    <button onclick="openAddUserModal()">Open Add User Modal</button>
    
    <!-- Add User Modal -->
    <div id="addUserModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999;">
        <div style="background: white; margin: 50px auto; padding: 20px; width: 500px; border-radius: 10px;">
            <h2>Add User</h2>
            <form id="addUserForm">
                <input type="text" name="first_name" placeholder="First Name" required>
                <input type="text" name="last_name" placeholder="Last Name" required>
                <input type="email" name="email" placeholder="Email" required>
                <button type="submit">Create User</button>
                <button type="button" onclick="closeAddUserModal()">Cancel</button>
            </form>
        </div>
    </div>
    
    <!-- Success Modal -->
    <div id="addUserSuccessModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999;">
        <div style="background: white; margin: 50px auto; padding: 20px; width: 400px; border-radius: 10px;">
            <h2>Success!</h2>
            <p id="addUserSuccessMessage"></p>
            <button onclick="closeAddUserSuccessModal()">OK</button>
        </div>
    </div>
    
    <!-- Error Modal -->
    <div id="addUserErrorModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999;">
        <div style="background: white; margin: 50px auto; padding: 20px; width: 400px; border-radius: 10px;">
            <h2>Error!</h2>
            <p id="addUserErrorMessage"></p>
            <button onclick="closeAddUserErrorModal()">OK</button>
        </div>
    </div>
    
    <script src="./scripts/modal-add-user.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Toggle Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5f5;
        }
        .test-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }
        .password-group {
            position: relative;
        }
        .password-group input {
            width: 100%;
            padding: 12px 40px 12px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            cursor: pointer;
            z-index: 10;
            filter: invert(50%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(50%) contrast(100%);
            pointer-events: auto;
            user-select: none;
        }
        .test-result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #e8f5e8;
            border: 1px solid #4caf50;
        }
        .test-result.error {
            background: #ffebee;
            border-color: #f44336;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>Password Toggle Test</h1>
        <p>This test verifies that the password show/hide functionality works correctly.</p>
        
        <div class="form-group password-group">
            <label for="test-password">Test Password:</label>
            <input type="password" id="test-password" placeholder="Enter password">
            <img src="src/assets/icons/show_password.png" class="toggle-password" data-target="test-password" alt="Show/Hide Password">
        </div>
        
        <div class="form-group password-group">
            <label for="test-confirm">Confirm Password:</label>
            <input type="password" id="test-confirm" placeholder="Confirm password">
            <img src="src/assets/icons/show_password.png" class="toggle-password" data-target="test-confirm" alt="Show/Hide Password">
        </div>
        
        <div id="test-result" class="test-result" style="display: none;">
            <h3>Test Results:</h3>
            <div id="test-output"></div>
        </div>
        
        <button onclick="runTest()" style="background: #4caf50; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">Run Test</button>
    </div>

    <script>
        // Test the password toggle functionality
        document.querySelectorAll('.toggle-password').forEach(icon => {
            icon.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                console.log('Toggle password clicked:', this.dataset.target);
                const targetId = this.dataset.target;
                const targetInput = document.getElementById(targetId);
                if (targetInput) {
                    if (targetInput.type === 'password') {
                        targetInput.type = 'text';
                        this.src = 'src/assets/icons/hide_password.png';
                        console.log('Password shown');
                    } else {
                        targetInput.type = 'password';
                        this.src = 'src/assets/icons/show_password.png';
                        console.log('Password hidden');
                    }
                } else {
                    console.error('Target input not found:', targetId);
                }
            });
        });

        function runTest() {
            const result = document.getElementById('test-result');
            const output = document.getElementById('test-output');
            const passwordInput = document.getElementById('test-password');
            const confirmInput = document.getElementById('test-confirm');
            
            let tests = [];
            
            // Test 1: Check if elements exist
            tests.push({
                name: 'Password input exists',
                passed: passwordInput !== null
            });
            
            tests.push({
                name: 'Confirm input exists',
                passed: confirmInput !== null
            });
            
            // Test 2: Check if toggle icons exist
            const toggleIcons = document.querySelectorAll('.toggle-password');
            tests.push({
                name: 'Toggle icons exist',
                passed: toggleIcons.length === 2
            });
            
            // Test 3: Check if password-group has position relative
            const passwordGroups = document.querySelectorAll('.password-group');
            let allHavePositionRelative = true;
            passwordGroups.forEach(group => {
                const style = window.getComputedStyle(group);
                if (style.position !== 'relative') {
                    allHavePositionRelative = false;
                }
            });
            tests.push({
                name: 'Password groups have position relative',
                passed: allHavePositionRelative
            });
            
            // Display results
            let html = '';
            let allPassed = true;
            tests.forEach(test => {
                const status = test.passed ? '✅ PASS' : '❌ FAIL';
                const color = test.passed ? 'green' : 'red';
                html += `<div style="color: ${color}; margin-bottom: 5px;">${status}: ${test.name}</div>`;
                if (!test.passed) allPassed = false;
            });
            
            output.innerHTML = html;
            result.style.display = 'block';
            result.className = allPassed ? 'test-result' : 'test-result error';
            
            if (allPassed) {
                output.innerHTML += '<div style="color: green; margin-top: 10px; font-weight: bold;">🎉 All tests passed! The password toggle should work correctly.</div>';
            } else {
                output.innerHTML += '<div style="color: red; margin-top: 10px; font-weight: bold;">⚠️ Some tests failed. Check the console for more details.</div>';
            }
        }
    </script>
</body>
</html>
